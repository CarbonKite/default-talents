runner:
  module: ""
  class_name: ""
hooks:
  module: ""
  pre_task: ""
  post_task: ""
context:
  prompt_sections:
  - file: prompt_sections/agents_guide.md
    name: agents_guide
    priority: 40
  inject_progress_log: true
  inject_task_history: true
limits:
  max_retries: 3
  retry_delays: [5, 15, 30]
  max_subtask_iterations: 3
  max_subtask_depth: 2
  task_timeout_seconds: 600
capabilities:
  file_upload: false
  websocket: false
  sandbox: true
  image_generation: false
